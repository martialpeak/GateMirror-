name: Generate SSTP Links

on:
  schedule:
    - cron: '0 */4 * * *'   # هر ۴ ساعت یک‌بار
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build sstp:// links with country names
        run: python3 build_sstp_links.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sstp_links.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update sstp links $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
